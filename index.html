<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Merge Orchard — Physics Fruit Merging Game</title>
<meta name="description" content="A juicy physics merging puzzle. Drop fruit, merge matching tiers, chase a new high score." />
<meta name="theme-color" content="#1B1530" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">

  <div class="hud">
    <div class="hud-card">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-value">0</div>
    </div>
    <div class="hud-card hud-next">
      <div>
        <div class="hud-label">Next</div>
        <div class="next-swatch" id="next-swatch"></div>
      </div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Best</div>
      <div class="hud-value" id="highscore-value">0</div>
    </div>
  </div>

  <div class="stage">
    <canvas id="game-canvas" aria-label="Merge Orchard play field"></canvas>
    <div class="danger-indicator" id="danger-indicator"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="btn-left" aria-label="Move left">◀</button>
    <button class="ctrl-btn" id="btn-drop" aria-label="Drop item">DROP</button>
    <button class="ctrl-btn" id="btn-right" aria-label="Move right">▶</button>
  </div>

  <div class="hint">Drag / arrow keys to aim · tap, click, or space to drop</div>

</div>

<div class="modal-overlay" id="game-over">
  <div class="modal-card">
    <h2>Game Over</h2>
    <div class="modal-stat">
      <span class="hud-label">Final Score</span>
      <span class="hud-value" id="final-score">0</span>
    </div>
    <div class="modal-stat">
      <span class="hud-label">Best Score</span>
      <span class="hud-value" id="final-highscore">0</span>
      <div><span class="badge" id="new-high-badge" style="display:none;">New High Score!</span></div>
    </div>
    <button id="restart-btn">Play Again</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
