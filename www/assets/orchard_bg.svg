<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 560" width="360" height="560">
  <defs>
    <radialGradient id="skyGrad" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1a3d0a"/>
      <stop offset="60%" stop-color="#0d2206"/>
      <stop offset="100%" stop-color="#060f03"/>
    </radialGradient>
    <radialGradient id="groundGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#1a3a0a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#060f03" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbe0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur1"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <!-- Sky background -->
  <rect width="360" height="560" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <g opacity="0.7">
    <circle cx="30" cy="30" r="1" fill="#fff"/>
    <circle cx="80" cy="15" r="1.2" fill="#fff"/>
    <circle cx="150" cy="25" r="0.8" fill="#fff"/>
    <circle cx="220" cy="10" r="1" fill="#fff"/>
    <circle cx="290" cy="35" r="1.3" fill="#fff"/>
    <circle cx="330" cy="20" r="0.9" fill="#fff"/>
    <circle cx="55" cy="60" r="0.8" fill="#FFD700" opacity="0.6"/>
    <circle cx="180" cy="45" r="1" fill="#FFD700" opacity="0.5"/>
    <circle cx="310" cy="55" r="0.9" fill="#fff"/>
    <circle cx="120" cy="8" r="1.1" fill="#fff"/>
  </g>

  <!-- Moon / sun glow top center -->
  <circle cx="180" cy="0" r="80" fill="url(#moonGlow)" filter="url(#blur6)"/>
  <circle cx="180" cy="0" r="30" fill="#fffbe0" opacity="0.15" filter="url(#blur3)"/>

  <!-- Distant tree silhouettes (back layer) -->
  <g opacity="0.25" fill="#0d2206">
    <ellipse cx="40" cy="320" rx="30" ry="60"/>
    <rect x="34" y="370" width="12" height="40"/>
    <ellipse cx="320" cy="300" rx="35" ry="65"/>
    <rect x="314" y="355" width="12" height="50"/>
    <ellipse cx="185" cy="290" rx="28" ry="55"/>
    <rect x="179" y="340" width="12" height="45"/>
    <ellipse cx="90" cy="310" rx="22" ry="48"/>
    <ellipse cx="260" cy="315" rx="25" ry="52"/>
  </g>

  <!-- Mid-layer trees -->
  <g opacity="0.45" fill="#122a06">
    <ellipse cx="65" cy="380" rx="38" ry="70"/>
    <rect x="59" y="440" width="14" height="50"/>
    <ellipse cx="295" cy="370" rx="40" ry="72"/>
    <rect x="289" y="430" width="14" height="52"/>
  </g>

  <!-- Ground glow -->
  <rect x="0" y="430" width="360" height="130" fill="url(#groundGlow)"/>

  <!-- Ground -->
  <ellipse cx="180" cy="530" rx="220" ry="50" fill="#0a1a05" opacity="0.8"/>

  <!-- Foreground grass hints -->
  <g opacity="0.3" fill="#1a3a0a">
    <ellipse cx="180" cy="555" rx="200" ry="30"/>
    <ellipse cx="50" cy="548" rx="60" ry="18"/>
    <ellipse cx="310" cy="548" rx="60" ry="18"/>
  </g>

  <!-- Glowing orbs / fireflies -->
  <g filter="url(#blur1)">
    <circle cx="60" cy="200" r="3" fill="#FFD700" opacity="0.5"/>
    <circle cx="290" cy="180" r="2.5" fill="#FFD700" opacity="0.4"/>
    <circle cx="140" cy="350" r="2" fill="#a8e6cf" opacity="0.5"/>
    <circle cx="230" cy="280" r="2.5" fill="#FFD700" opacity="0.45"/>
    <circle cx="80" cy="420" r="2" fill="#a8e6cf" opacity="0.4"/>
    <circle cx="300" cy="400" r="3" fill="#FFD700" opacity="0.35"/>
    <circle cx="180" cy="160" r="2" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Subtle path/ground line -->
  <ellipse cx="180" cy="510" rx="90" ry="12" fill="#1a3a0a" opacity="0.4"/>
</svg>
